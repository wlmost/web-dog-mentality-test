<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">API Connection Test</h3>
            </div>
            <div class="card-body">
                <div id="results"></div>
                <button class="btn btn-primary" onclick="testConnection()">Test starten</button>
            </div>
        </div>
    </div>

    <script>
        // Automatische API-URL-Generierung (HTTPS-kompatibel)
        function getApiUrl(endpoint) {
            const protocol = window.location.protocol;
            const host = window.location.host;
            const basePath = window.location.pathname.split('/').slice(0, -1).join('/');
            return `${protocol}//${host}${basePath}/../api/${endpoint}`;
        }
        
        async function testConnection() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="spinner-border" role="status"><span class="visually-hidden">Loading...</span></div>';
            
            const results = [];
            
            // Test 1: URL Auflösung
            const authUrl = getApiUrl('auth.php');
            results.push(`<h5>URL Test</h5>`);
            results.push(`<p><strong>Current URL:</strong> ${window.location.href}</p>`);
            results.push(`<p><strong>Protocol:</strong> ${window.location.protocol}</p>`);
            results.push(`<p><strong>Resolved API URL:</strong> ${authUrl}</p>`);
            
            // Test 2: Fetch mit verschiedenen URLs
            const urlsToTest = [
                getApiUrl('auth.php'),
                getApiUrl('test-db.php'),
                getApiUrl('users.php')
            ];
            
            results.push(`<h5 class="mt-4">Fetch Tests</h5>`);
            
            for (const url of urlsToTest) {
                results.push(`<div class="mt-3"><strong>Testing: ${url}</strong>`);
                
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'test' })
                    });
                    
                    const contentType = response.headers.get('content-type');
                    const text = await response.text();
                    
                    results.push(`<br>✓ Response Status: ${response.status}`);
                    results.push(`<br>✓ Content-Type: ${contentType || 'undefined'}`);
                    results.push(`<br>✓ Response Preview: ${text.substring(0, 200)}...`);
                    
                    if (contentType && contentType.includes('application/json')) {
                        try {
                            const json = JSON.parse(text);
                            results.push(`<br>✓ JSON Parse: OK`);
                            results.push(`<br>✓ JSON: <pre>${JSON.stringify(json, null, 2)}</pre>`);
                        } catch (e) {
                            results.push(`<br>✗ JSON Parse Error: ${e.message}`);
                        }
                    } else {
                        results.push(`<br>⚠ Warning: Not JSON response!`);
                    }
                    
                } catch (error) {
                    results.push(`<br>✗ Fetch Error: ${error.message}`);
                }
                
                results.push(`</div>`);
            }
            
            // Test 3: Login Test
            results.push(`<h5 class="mt-4">Login API Test</h5>`);
            const loginUrl = getApiUrl('auth.php');
            results.push(`<p><strong>Login URL:</strong> ${loginUrl}</p>`);
            
            try {
                const response = await fetch(loginUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'login',
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                const contentType = response.headers.get('content-type');
                const text = await response.text();
                
                results.push(`<p><strong>Status:</strong> ${response.status}</p>`);
                results.push(`<p><strong>Content-Type:</strong> ${contentType}</p>`);
                
                if (contentType && contentType.includes('application/json')) {
                    try {
                        const json = JSON.parse(text);
                        results.push(`<p><strong>Response:</strong></p><pre class="bg-light p-3">${JSON.stringify(json, null, 2)}</pre>`);
                    } catch (e) {
                        results.push(`<p class="text-danger"><strong>JSON Parse Error:</strong> ${e.message}</p>`);
                        results.push(`<p><strong>Raw Response:</strong></p><pre class="bg-light p-3">${text.substring(0, 1000)}</pre>`);
                    }
                } else {
                    results.push(`<p class="text-warning"><strong>Non-JSON Response:</strong></p><pre class="bg-light p-3">${text.substring(0, 1000)}</pre>`);
                }
                
            } catch (error) {
                results.push(`<p class="text-danger"><strong>Error:</strong> ${error.message}</p>`);
            }
            
            resultsDiv.innerHTML = results.join('\n');
        }
    </script>
</body>
</html>
